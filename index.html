<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Front Bird | Private Vault</title>
    <style>
        :root {
            --burgundy: #4a0012;
            --accent: #FFD700;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 215, 0, 0.3);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at top, #630018, #2b000b);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            height: 220px;
            background: linear-gradient(rgba(74, 0, 18, 0.6), rgba(74, 0, 18, 0.8)), 
                        url('https://i.ibb.co/WvdHgn4g/banner.png') no-repeat center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid var(--border);
            text-align: center;
        }

        header h1 {
            font-size: 2.5rem;
            margin: 0;
            letter-spacing: 4px;
            color: var(--accent);
            text-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        header p {
            color: rgba(255, 215, 0, 0.8);
            margin: 10px 0 0;
            font-weight: 300;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }

        .container {
            width: 90%;
            max-width: 600px;
            margin-top: -40px; /* Slight overlap for modern look */
        }

        #dropZone {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px dashed var(--accent);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        #dropZone:hover {
            background: rgba(255, 215, 0, 0.1);
            transform: translateY(-3px);
            border-style: solid;
        }

        .upload-icon {
            font-size: 40px;
            color: var(--accent);
            margin-bottom: 15px;
        }

        #fileList {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .section-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
            margin-bottom: 10px;
            opacity: 0.7;
        }

        .fileItem {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px 20px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideIn 0.3s ease-out forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-group { display: flex; gap: 8px; }

        button {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
        }

        button:hover {
            background: var(--accent);
            color: var(--burgundy);
        }

        footer {
            margin-top: auto;
            padding: 40px;
            font-size: 0.75rem;
            color: rgba(255, 215, 0, 0.4);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<header>
    <h1>FRONT BIRD</h1>
    <p>SECURE • LOCAL • MULTI-TIERED</p>
</header>

<div class="container">
    <div id="dropZone">
        <div class="upload-icon">↑</div>
        <div>Drop files here or <span style="text-decoration: underline; color: var(--accent);">browse</span></div>
    </div>

    <div id="fileListContainer">
        <div class="section-label" style="margin-top: 40px;">Your Private Storage</div>
        <div id="fileList"></div>
    </div>
</div>

<footer>FRONT BIRD &copy; 2026 — BROWSER-SIDE VAULT</footer>

<script>
    /* JavaScript logic remains essentially the same as previous version to maintain functionality */
    const dbName = "FrontBirdDB";
    const storeName = "files";
    let db;
    const inMemoryFiles = {};

    const request = indexedDB.open(dbName, 1);
    request.onupgradeneeded = (e) => { e.target.result.createObjectStore(storeName, { keyPath: "name" }); };
    request.onsuccess = (e) => { db = e.target.result; loadFiles(); };

    const dropZone = document.getElementById('dropZone');
    dropZone.onclick = () => {
        const input = document.createElement('input');
        input.type = 'file'; input.multiple = true;
        input.onchange = () => handleFiles(input.files);
        input.click();
    };

    function handleFiles(files) {
        for (let file of files) {
            if (file.size <= 5*1024*1024) storeLocalStorage(file);
            else if (file.size <= 50*1024*1024) storeIndexedDB(file);
            else storeInMemory(file);
        }
    }

    function storeLocalStorage(file) {
        const reader = new FileReader();
        reader.onload = () => {
            try { localStorage.setItem(`fb_${file.name}`, reader.result); loadFiles(); }
            catch(e) { console.warn("Storage full"); }
        };
        reader.readAsDataURL(file);
    }

    function storeIndexedDB(file) {
        const tx = db.transaction(storeName, "readwrite");
        tx.objectStore(storeName).put({ name: file.name, blob: file });
        tx.oncomplete = () => loadFiles();
    }

    function storeInMemory(file) {
        inMemoryFiles[file.name] = file;
        loadFiles();
    }

    function loadFiles() {
        const list = document.getElementById('fileList');
        list.innerHTML = '';
        
        // Render Logic
        for (let key in localStorage) {
            if (key.startsWith('fb_')) list.appendChild(createFileDiv(key.slice(3), 'Local'));
        }
        if (db) {
            db.transaction(storeName, "readonly").objectStore(storeName).getAll().onsuccess = (e) => {
                e.target.result.forEach(f => list.appendChild(createFileDiv(f.name, 'DB')));
                for (let name in inMemoryFiles) list.appendChild(createFileDiv(name, 'RAM'));
            };
        }
    }

    function createFileDiv(name, type) {
        const div = document.createElement('div');
        div.className = 'fileItem';
        div.innerHTML = `
            <span>${name} <small style="opacity:0.5; margin-left:8px;">[${type}]</small></span>
            <div class="btn-group">
                <button onclick="alert('Action triggered for ${name}')">Action</button>
            </div>
        `;
        return div;
    }
</script>

</body>
</html>
