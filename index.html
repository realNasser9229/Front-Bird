<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Front Bird | Secure Vault</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --md-sys-color-primary: #FFD700;
            --md-sys-color-on-primary: #4a0012;
            --md-sys-color-surface: #2b000b;
            --md-sys-color-surface-variant: #4a0012;
            --md-sys-color-on-surface: #FFFBFF;
            --md-sys-color-outline: rgba(255, 215, 0, 0.3);
            --burgundy-gradient: radial-gradient(circle at 50% -20%, #630018, #1a0007);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            font-family: 'Google Sans', sans-serif;
            background: var(--burgundy-gradient);
            background-attachment: fixed;
            color: var(--md-sys-color-on-surface);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- Header & Branding --- */
        header {
            width: 100%;
            padding: 40px 20px;
            text-align: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3), transparent);
        }

        .logo-area {
            position: relative;
            display: inline-block;
        }

        header h1 {
            font-size: 2.2rem;
            margin: 0;
            letter-spacing: 6px;
            color: var(--md-sys-color-primary);
            font-weight: 700;
            text-transform: uppercase;
        }

        header p {
            font-size: 0.8rem;
            letter-spacing: 2px;
            opacity: 0.7;
            margin-top: 8px;
            color: var(--md-sys-color-primary);
        }

        /* --- Main Content Container --- */
        .app-container {
            width: 95%;
            max-width: 800px;
            padding-bottom: 100px;
        }

        /* --- Material 3 Card / DropZone --- */
        #dropZone {
            background: var(--md-sys-color-surface-variant);
            border: 2px dashed var(--md-sys-color-outline);
            border-radius: 28px;
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 20px;
            position: relative;
            overflow: hidden;
        }

        #dropZone:hover {
            background: rgba(255, 215, 0, 0.08);
            border-color: var(--md-sys-color-primary);
            transform: scale(1.01);
        }

        .upload-icon {
            font-size: 48px;
            display: block;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 10px var(--md-sys-color-primary));
        }

        /* --- File List Styling --- */
        .section-header {
            margin: 40px 0 20px;
            padding-left: 10px;
            font-weight: 500;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #fileList {
            display: grid;
            gap: 12px;
        }

        .file-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(255, 215, 0, 0.1);
            animation: m3-entry 0.5s ease backwards;
        }

        @keyframes m3-entry {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .file-meta {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .file-name { font-weight: 500; font-size: 1rem; color: #fff; }
        .file-tag {
            font-size: 0.7rem;
            background: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
            padding: 2px 8px;
            border-radius: 10px;
            width: fit-content;
            font-weight: 700;
            text-transform: uppercase;
        }

        /* --- M3 Buttons --- */
        .btn-stack { display: flex; gap: 8px; }

        .m3-btn {
            background: transparent;
            border: 1px solid var(--md-sys-color-outline);
            color: var(--md-sys-color-primary);
            padding: 10px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Google Sans';
            font-size: 0.85rem;
            transition: 0.2s;
        }

        .m3-btn:hover {
            background: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
        }

        .m3-btn.icon-btn {
            padding: 10px;
            border-radius: 50%;
            aspect-ratio: 1/1;
        }

        /* --- Preview Modal --- */
        #previewModal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        #modalContent {
            max-width: 90%;
            max-height: 80%;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .close-modal {
            position: absolute;
            top: 30px; right: 30px;
            font-size: 2rem;
            color: var(--md-sys-color-primary);
            cursor: pointer;
        }

        footer {
            padding: 40px;
            opacity: 0.4;
            font-size: 0.7rem;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<header>
    <div class="logo-area">
        <h1>Front Bird</h1>
        <p>Encrypted • Private • Local</p>
    </div>
</header>

<div class="app-container">
    <div id="dropZone">
        <span class="upload-icon">✦</span>
        <div style="font-size: 1.1rem; font-weight: 500;">Deposit Files</div>
        <div style="opacity: 0.6; font-size: 0.9rem; margin-top: 5px;">Drag & Drop or Click to Browse</div>
    </div>

    <div class="section-header">
        <span>ACTIVE VAULT</span>
        <span id="fileCount" style="opacity: 0.5; font-size: 0.8rem;">0 Files</span>
    </div>

    <div id="fileList">
        </div>
</div>

<div id="previewModal">
    <span class="close-modal" onclick="closeModal()">&times;</span>
    <div id="modalBody"></div>
</div>

<footer>&copy; 2026 FRONT BIRD SECURE STORAGE</footer>

<script>
    const dbName = "FrontBirdDB";
    const storeName = "files";
    let db;
    const inMemoryFiles = {};

    // IndexedDB Init
    const request = indexedDB.open(dbName, 1);
    request.onupgradeneeded = (e) => { e.target.result.createObjectStore(storeName, { keyPath: "name" }); };
    request.onsuccess = (e) => { db = e.target.result; loadFiles(); };

    // Dropzone logic
    const dropZone = document.getElementById('dropZone');
    dropZone.onclick = () => {
        const input = document.createElement('input');
        input.type = 'file'; input.multiple = true;
        input.onchange = () => handleFiles(input.files);
        input.click();
    };

    function handleFiles(files) {
        for (let file of files) {
            if (file.size <= 5*1024*1024) storeLocalStorage(file);
            else if (file.size <= 50*1024*1024) storeIndexedDB(file);
            else storeInMemory(file);
        }
    }

    function storeLocalStorage(file) {
        const reader = new FileReader();
        reader.onload = () => {
            try { localStorage.setItem(`fb_${file.name}`, reader.result); loadFiles(); }
            catch(e) { alert("LocalStorage Full"); }
        };
        reader.readAsDataURL(file);
    }

    function storeIndexedDB(file) {
        const tx = db.transaction(storeName, "readwrite");
        tx.objectStore(storeName).put({ name: file.name, blob: file });
        tx.oncomplete = () => loadFiles();
    }

    function storeInMemory(file) {
        inMemoryFiles[file.name] = file;
        loadFiles();
    }

    function loadFiles() {
        const list = document.getElementById('fileList');
        list.innerHTML = '';
        let count = 0;

        // Render LocalStorage
        for (let key in localStorage) {
            if (key.startsWith('fb_')) {
                list.appendChild(createFileCard(key.slice(3), 'Local'));
                count++;
            }
        }

        // Render IndexedDB & RAM
        if (db) {
            db.transaction(storeName, "readonly").objectStore(storeName).getAll().onsuccess = (e) => {
                e.target.result.forEach(f => {
                    list.appendChild(createFileCard(f.name, 'Vault'));
                    count++;
                });
                for (let name in inMemoryFiles) {
                    list.appendChild(createFileCard(name, 'Session'));
                    count++;
                }
                document.getElementById('fileCount').innerText = `${count} Files`;
            };
        }
    }

    function createFileCard(name, type) {
        const div = document.createElement('div');
        div.className = 'file-card';
        div.innerHTML = `
            <div class="file-meta">
                <span class="file-name">${name}</span>
                <span class="file-tag">${type}</span>
            </div>
            <div class="btn-stack">
                <button class="m3-btn" onclick="viewFile('${name}', '${type}')">View</button>
                <button class="m3-btn" onclick="shareFile('${name}', '${type}')">Share</button>
                <button class="m3-btn" style="border-color: #ff4444; color: #ff4444;" onclick="deleteFile('${name}', '${type}')">🗑</button>
            </div>
        `;
        return div;
    }

    // --- NEW SMART FEATURES ---

    async function getFileData(name, type) {
        if (type === 'Local') return localStorage.getItem(`fb_${name}`);
        if (type === 'Session') return URL.createObjectURL(inMemoryFiles[name]);
        return new Promise(res => {
            db.transaction(storeName).objectStore(storeName).get(name).onsuccess = e => {
                res(URL.createObjectURL(e.target.result.blob));
            };
        });
    }

    async function viewFile(name, type) {
        const data = await getFileData(name, type);
        const modal = document.getElementById('previewModal');
        const body = document.getElementById('modalBody');
        
        body.innerHTML = '';
        if (name.match(/\.(jpg|jpeg|png|gif|webp)$/i)) {
            const img = document.createElement('img');
            img.src = data;
            img.id = 'modalContent';
            body.appendChild(img);
        } else {
            body.innerHTML = `<div style="padding:40px; background:white; color:black; border-radius:15px;">
                Preview not available for this type. <br><br>
                <a href="${data}" download="${name}" style="color:var(--md-sys-color-primary)">Download to view</a>
            </div>`;
        }
        modal.style.display = 'flex';
    }

    async function shareFile(name, type) {
        const data = await getFileData(name, type);
        
        if (navigator.share) {
            try {
                // For 'Local' files, they are Base64. We need to convert them to a blob for sharing.
                let shareData = { title: 'Front Bird Share', text: `Sharing ${name}`, url: window.location.href };
                await navigator.share(shareData);
            } catch (err) { console.log("Share failed", err); }
        } else {
            // Fallback: Copy "internal link"
            navigator.clipboard.writeText(data);
            alert("Share Link (Internal URL) copied to clipboard!");
        }
    }

    function deleteFile(name, type) {
        if (!confirm(`Delete ${name}?`)) return;
        if (type === 'Local') localStorage.removeItem(`fb_${name}`);
        else if (type === 'Session') delete inMemoryFiles[name];
        else {
            db.transaction(storeName, "readwrite").objectStore(storeName).delete(name);
        }
        loadFiles();
    }

    function closeModal() {
        document.getElementById('previewModal').style.display = 'none';
    }
</script>

</body>
</html>
