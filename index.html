<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Front Bird | Vault</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --burgundy: #4a0012;
            --accent: #FFD700;
            --surface: #2b000b;
            --glass: rgba(255, 255, 255, 0.05);
            --outline: rgba(255, 215, 0, 0.2);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            font-family: 'Google Sans', sans-serif;
            background: radial-gradient(circle at center, #5a0016, #1a0007);
            background-attachment: fixed;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- YouTube-Style Compact Banner --- */
        .hero-banner {
            width: 100%;
            height: 220px; /* PC height */
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.7)), 
                        url('https://i.ibb.co/WvdHgn4g/banner.png') no-repeat center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-bottom: 2px solid var(--accent);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        @media (max-width: 600px) {
            .hero-banner { height: 140px; } /* Mobile height */
            .hero-banner h1 { font-size: 1.8rem !important; }
        }

        .hero-banner h1 {
            font-size: 2.8rem;
            letter-spacing: 5px;
            color: var(--accent);
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        .hero-banner p {
            font-size: 0.75rem;
            letter-spacing: 3px;
            opacity: 0.8;
            margin-top: 5px;
            background: rgba(0,0,0,0.3);
            padding: 2px 10px;
            border-radius: 4px;
        }

        /* --- Main App Container --- */
        .app-container {
            width: 95%;
            max-width: 750px;
            padding: 25px 0 100px;
        }

        /* --- Compact DropZone --- */
        #dropZone {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px dashed var(--accent);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 30px;
        }

        #dropZone:hover {
            background: rgba(255, 215, 0, 0.05);
            transform: translateY(-2px);
        }

        .upload-icon { font-size: 32px; color: var(--accent); margin-bottom: 8px; }

        /* --- Smart File List --- */
        .vault-label {
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent);
            opacity: 0.6;
            margin-bottom: 15px;
            display: block;
        }

        .file-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--outline);
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            animation: slideUp 0.4s ease forwards;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .file-info { display: flex; flex-direction: column; gap: 4px; }
        .file-name { font-weight: 500; font-size: 0.95rem; max-width: 250px; overflow: hidden; text-overflow: ellipsis; }
        .file-tag {
            font-size: 0.6rem;
            background: var(--accent);
            color: var(--burgundy);
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 800;
            width: fit-content;
        }

        .actions { display: flex; gap: 6px; }

        .btn {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            cursor: pointer;
            font-weight: 600;
        }

        .btn:hover { background: var(--accent); color: var(--burgundy); }
        .btn-del { border-color: #ff5555; color: #ff5555; }
        .btn-del:hover { background: #ff5555; color: white; }

        /* --- Modal --- */
        #modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(20px);
            display: none; justify-content: center; align-items: center; z-index: 100;
        }

        #modal img { max-width: 90%; max-height: 80%; border-radius: 10px; border: 2px solid var(--accent); }

        footer { margin-top: auto; padding: 20px; font-size: 0.65rem; opacity: 0.4; text-align: center; }
    </style>
</head>
<body>

<div class="hero-banner">
    <h1>Front Bird</h1>
    <p>SECURE • LOCAL • PRIVATE</p>
</div>

<div class="app-container">
    <div id="dropZone">
        <div class="upload-icon">✦</div>
        <div style="font-weight: 500;">Secure Deposit</div>
        <div style="font-size: 0.8rem; opacity: 0.6;">Drop files or click to browse</div>
    </div>

    <span class="vault-label">Vault Assets</span>
    <div id="fileList"></div>
</div>

<div id="modal" onclick="this.style.display='none'">
    <div id="modalBody"></div>
</div>

<footer>&copy; 2026 FRONT BIRD VAULT</footer>

<script>
    const dbName = "FB_Storage";
    const storeName = "vault";
    let db;
    const inMemory = {};

    // IDB Init
    const request = indexedDB.open(dbName, 1);
    request.onupgradeneeded = e => e.target.result.createObjectStore(storeName, { keyPath: "name" });
    request.onsuccess = e => { db = e.target.result; render(); };

    // Dropzone
    const dropZone = document.getElementById('dropZone');
    dropZone.onclick = () => {
        const i = document.createElement('input'); i.type = 'file'; i.multiple = true;
        i.onchange = () => handle(i.files); i.click();
    };

    function handle(files) {
        for (let f of files) {
            if (f.size <= 5*1024*1024) {
                const r = new FileReader();
                r.onload = () => { localStorage.setItem(`fb_${f.name}`, r.result); render(); };
                r.readAsDataURL(f);
            } else if (f.size <= 50*1024*1024) {
                db.transaction(storeName, "readwrite").objectStore(storeName).put({ name: f.name, blob: f });
                render();
            } else {
                inMemory[f.name] = f;
                render();
            }
        }
    }

    async function getSource(name, type) {
        if (type === 'LOCAL') return localStorage.getItem(`fb_${name}`);
        if (type === 'RAM') return URL.createObjectURL(inMemory[name]);
        return new Promise(res => {
            db.transaction(storeName).objectStore(storeName).get(name).onsuccess = e => {
                res(URL.createObjectURL(e.target.result.blob));
            };
        });
    }

    async function render() {
        const list = document.getElementById('fileList');
        list.innerHTML = '';
        
        // Local
        for (let k in localStorage) if (k.startsWith('fb_')) list.appendChild(createItem(k.slice(3), 'LOCAL'));
        
        // IDB & RAM
        if (db) {
            db.transaction(storeName).objectStore(storeName).getAll().onsuccess = (e) => {
                e.target.result.forEach(f => list.appendChild(createItem(f.name, 'VAULT')));
                for (let n in inMemory) list.appendChild(createItem(n, 'RAM'));
            };
        }
    }

    function createItem(name, type) {
        const d = document.createElement('div');
        d.className = 'file-card';
        d.innerHTML = `
            <div class="file-info">
                <span class="file-name">${name}</span>
                <span class="file-tag">${type}</span>
            </div>
            <div class="actions">
                <button class="btn" onclick="view('${name}', '${type}')">View</button>
                <button class="btn" onclick="share('${name}', '${type}')">Share</button>
                <button class="btn btn-del" onclick="del('${name}', '${type}')">×</button>
            </div>
        `;
        return d;
    }

    async function view(name, type) {
        const src = await getSource(name, type);
        const modal = document.getElementById('modal');
        const body = document.getElementById('modalBody');
        body.innerHTML = '';

        if (name.match(/\.(jpg|jpeg|png|gif|webp)$/i)) {
            const img = document.createElement('img'); img.src = src;
            body.appendChild(img);
            modal.style.display = 'flex';
        } else {
            const a = document.createElement('a'); a.href = src; a.download = name; a.click();
        }
    }

    async function share(name, type) {
        const src = await getSource(name, type);
        if (navigator.share) {
            navigator.share({ title: 'Front Bird', text: name, url: window.location.href });
        } else {
            navigator.clipboard.writeText(src);
            alert("Share Link (Internal) copied!");
        }
    }

    function del(name, type) {
        if (type === 'LOCAL') localStorage.removeItem(`fb_${name}`);
        else if (type === 'RAM') delete inMemory[name];
        else db.transaction(storeName, "readwrite").objectStore(storeName).delete(name);
        render();
    }
</script>

</body>
</html>
